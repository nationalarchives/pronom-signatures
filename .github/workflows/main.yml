name: Release PRONOM
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    name: Main release test
    environment: prod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - name: Configure AWS credentials for Lambda
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  #v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/PRONOMSignatureRole
          aws-region: eu-west-2
          role-session-name: DeployPRONOM
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: |
          .github/scripts/create_signature_files.sh --release
          NEW_SIGNATURE_FILENAME=$(echo DROID_SignatureFile_V$(curl https://pronom.nationalarchives.gov.uk/signatures.json | jq '.latest_signature.version | tonumber'+1).xml)
          aws s3 cp signature-file.xml s3://prod-pronom-website/signatures/$NEW_SIGNATURE_FILENAME
          aws s3 cp container-signature-file.xml s3://prod-pronom-website/container-signatures/container-signature-$(date +%Y%m%d).xml
          aws s3 cp container-signature-file.xml s3://prod-pronom-website/container-signature.xml
          python .github/scripts/generate_signature_json.py prod $ACCOUNT_ID
        env:
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      - name: Build website
        uses: octokit/request-action@dad4362715b7fb2ddedf9772c8670824af564f0d #v2.4.0
        with:
          ref: main
          route: POST /repos/nationalarchives/pronom-website/actions/workflows/release.yml/dispatches
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}